services:
  web:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.web
    environment:
      VITE_API_PROXY_TARGET: http://api:3000
    ports:
      - "${WEB_PORT:-5173}:5173"

  admin:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.admin
    environment:
      VITE_API_PROXY_TARGET: http://api:3000
    ports:
      - "${ADMIN_PORT:-5174}:5174"

  api:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.api
    volumes:
      - ../../apps/api/uploads:/workspace/apps/api/uploads
    environment:
      DATABASE_URL: ${DATABASE_URL}
      API_PORT: 3000
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      UPLOAD_DIR: /workspace/apps/api/uploads
    depends_on:
      - postgres
    ports:
      - "${API_PORT:-3000}:3000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rainy_cole
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  meilisearch:
    image: getmeili/meilisearch:v1.15.2
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    ports:
      - "${MEILI_PORT:-7700}:7700"
    volumes:
      - ./data/meili:/meili_data

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - admin
      - api
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../apps/api/uploads:/usr/share/nginx/html/uploads:ro
