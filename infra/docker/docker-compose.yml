services:
  web:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm --filter @rainy/web dev --host 0.0.0.0"
    volumes:
      - ../../:/workspace
      - workspace_node_modules:/workspace/node_modules
    ports:
      - "${WEB_PORT:-5173}:5173"

  admin:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm --filter @rainy/admin dev --host 0.0.0.0"
    volumes:
      - ../../:/workspace
      - workspace_node_modules:/workspace/node_modules
    ports:
      - "${ADMIN_PORT:-5174}:5174"

  api:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm --filter @rainy/api dev"
    volumes:
      - ../../:/workspace
      - ../../apps/api/uploads:/workspace/apps/api/uploads
      - workspace_node_modules:/workspace/node_modules
    environment:
      DATABASE_URL: ${DATABASE_URL}
      API_PORT: ${API_PORT:-3000}
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      UPLOAD_DIR: /workspace/apps/api/uploads
    depends_on:
      - postgres
    ports:
      - "${API_PORT:-3000}:3000"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rainy_cole
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  meilisearch:
    image: getmeili/meilisearch:v1.9
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
    ports:
      - "${MEILI_PORT:-7700}:7700"
    volumes:
      - ./data/meili:/meili_data

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - admin
      - api
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../apps/api/uploads:/usr/share/nginx/html/uploads:ro

volumes:
  workspace_node_modules:
